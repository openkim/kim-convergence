name: Python package

on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [3.9, '3.10', 3.11, 3.12, 3.13]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Lint with flake8
      run: |
        pip install flake8==7.1.2 flake8-pyproject==1.2.3
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=40 --max-line-length=127 --statistics --exclude doc
    - name: Test with unittest
      run: |
        python -m tests
    - name: Verify STFFT backend is active
      if: matrix.os == 'ubuntu-latest'
      env:
        KIM_CONV_STFFT: "1"
      run: |
        python -c "from kim_convergence.stats._stfft import STFFT_AVAILABLE; assert STFFT_AVAILABLE, 'STFFT extension not built'"
        python -c "import kim_convergence.stats.tools as t; assert t._USE_STFFT, 'STFFT backend not selected'; print(t._rfft.__module__, t._irfft.__module__)"
    - name: Test STFFT wrapper cases
      if: matrix.os == 'ubuntu-latest'
      env:
        KIM_CONV_STFFT: "1"
      run: |
        python -m unittest tests.test_kim_convergence.test_stats.TestStfftWrapper
